# Grid search template: mcts — Rocket League
#
# Usage:
#   python grid_search.py games/rocket_league/config/gs_mcts_template.yaml --game rocket_league
#
# Good first sweep: mcts_c × alpha × n_bins.

base_name: "gs_rl_mcts_v1"
game: rocket_league

training_params:
  in_game_episode_s: 300.0
  tick_skip: 8
  n_sims: 300
  policy_type: mcts
  mcts_c: [1.0, 1.41, 2.0]
  alpha: [0.05, 0.1]
  gamma: 0.99
  n_bins: [3, 5]

reward_params:
  vel_to_ball_weight: [0.005, 0.01]
  boost_weight: -0.002
  touch_bonus: 1.0
  goal_weight: 10.0
  concede_penalty: 5.0
  step_penalty: -0.001
