# Grid search template: hill_climbing — Rocket League
#
# Usage:
#   python grid_search.py games/rocket_league/config/gs_hill_climbing_template.yaml --game rocket_league
#
# Good first sweep: mutation_scale × vel_to_ball_weight × touch_bonus.

base_name: "gs_rl_hill_climbing_v1"
game: rocket_league

training_params:
  in_game_episode_s: 300.0
  tick_skip: 8
  n_sims: 120
  policy_type: hill_climbing
  mutation_scale: [0.03, 0.05, 0.1]
  mutation_share: 1.0

reward_params:
  vel_to_ball_weight: [0.005, 0.01]
  boost_weight: -0.002
  touch_bonus: [0.5, 1.0]
  goal_weight: 10.0
  concede_penalty: 5.0
  step_penalty: -0.001
