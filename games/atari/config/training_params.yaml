# Atari training parameters.

game: atari                   # game module to use
map_name: Pong-v5             # ALE/<map_name> resolves via ale-py
speed: 1.0
in_game_episode_s: 60.0       # ~3600 env steps at 60 fps
n_sims: 100
mutation_scale: 0.05
mutation_share: 1.0
adaptive_mutation: true
patience: 0

policy_type: genetic

policy_params:
  population_size: 20
  elite_k: 3
