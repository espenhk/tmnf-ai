# Grid search: EpsilonGreedyPolicy (tabular Q-learning)
#
# Primary axes:
#   epsilon_decay   — how fast the policy shifts from exploration to exploitation.
#                     Too fast (0.99) → Q-table is sparse when greedy kicks in;
#                     too slow (0.999) → still mostly random by episode 200.
#                     With 200 episodes: 0.99^200 ≈ 0.13, 0.995^200 ≈ 0.37,
#                     0.999^200 ≈ 0.82 — spans the full useful range.
#   n_bins          — observation discretisation. With 15 features, n_bins=4
#                     produces 4^15 ≈ 1B possible states (extremely sparse).
#                     n_bins=2 gives 2^15 = 32768 (feasible), n_bins=3 gives
#                     14M (borderline). This axis is likely the deciding factor.
#
# n_sims=200: each sim is one online episode (not a hill-climbing trial), so
# many more are needed. This gives the Q-table enough data to converge.
# cold_restarts/cold_sims are required fields but unused by Q-learning policies.
#
# Combos: 3 x 3 = 9

base_name: "gs_epsilon_greedy_v1"

training_params:
  speed: 10.0
  n_sims: 200
  in_game_episode_s: 30.0
  mutation_scale: 0.05   # unused for Q-learning but required by grid_search.py
  probe_s: 8.0
  cold_restarts: 1       # unused for Q-learning but required by grid_search.py
  cold_sims: 1           # unused for Q-learning but required by grid_search.py
  n_lidar_rays: 0
  policy_type: epsilon_greedy

  # Fixed policy params
  alpha: 0.1
  gamma: 0.99
  epsilon: 1.0
  epsilon_min: 0.05

  # --- Search axes ---
  epsilon_decay: [0.99, 0.995, 0.999]
  n_bins: [2, 3, 4]

reward_params:
  progress_weight: 10000.0
  centerline_weight: -0.1
  centerline_exp: 2.0
  speed_weight: 0.05
  step_penalty: -0.05
  finish_bonus: 5000.0
  finish_time_weight: -5.0
  par_time_s: 60.0
  accel_bonus: 0.5
  airborne_penalty: -1.0
  crash_threshold_m: 25.0
  lidar_wall_weight: 0.0
