# Grid search: WeightedLinearPolicy (hill_climbing)
#
# Primary axes:
#   mutation_scale  — step size of the hill-climbing search. Too small → stuck
#                     in flat reward regions; too large → random walk with no
#                     improvement. This is the most impactful hyperparameter.
#   cold_restarts   — number of independent random basins explored before
#                     greedy begins. More restarts reduces sensitivity to the
#                     initial weight vector, at the cost of wall-clock time.
#
# n_sims is held fixed so training budget is constant across combos.
# Reward params are at master-config defaults for fair cross-policy comparison.
#
# Combos: 4 x 2 = 8

base_name: "gs_hill_climbing_v1"

training_params:
  speed: 10.0
  n_sims: 50
  in_game_episode_s: 30.0
  probe_s: 8.0
  cold_sims: 5
  n_lidar_rays: 0
  policy_type: hill_climbing
  mutation_scale: 0.05
  mutation_share: 1.0

  # --- Search axes ---
  cold_restarts: [5, 20]

reward_params:
  progress_weight: 10000.0
  centerline_weight: -0.1
  centerline_exp: 2.0
  speed_weight: 0.05
  step_penalty: -0.05
  finish_bonus: 5000.0
  finish_time_weight: -5.0
  par_time_s: 60.0
  accel_bonus: 0.5
  airborne_penalty: -1.0
  crash_threshold_m: 25.0
  lidar_wall_weight: [0, -5.0, -20.0, -50.0]  # search axis: wall-proximity penalty strength
