# Grid search config template — copy this file and edit before running.
# Usage (from tmnf/):
#   python grid_search.py config/my_grid.yaml [--no-interrupt]
#
# Any param set to a list becomes a search axis.
# One run is created per unique combination of list-valued params.
# Experiment names encode only the varied params, e.g.:
#   gs_lidar_v1__lwwn5
#   gs_lidar_v1__lwwn20
#   gs_lidar_v1__lwwn50
#
# This config sweeps the lidar wall penalty weight:
#   lidar_wall_weight: [-5, -20, -50]  → 3 combinations

base_name: "gs_lww_v1"

# ---------------------------------------------------------------------------
# Training params — listed axes become search dimensions
# ---------------------------------------------------------------------------
training_params:
  speed: 10.0
  n_sims: 50
  in_game_episode_s: 30.0
  mutation_scale: 0.05
  mutation_share: 1.0       # fraction of weights perturbed per mutation (1.0 = all, 0.2 = ~6/30)
  probe_s: 8.0
  cold_restarts: 20
  cold_sims: 5
  n_lidar_rays: 8
  policy_type: hill_climbing

# ---------------------------------------------------------------------------
# Reward params — listed axes become search dimensions
# ---------------------------------------------------------------------------
reward_params:
  progress_weight: 10000.0
  centerline_weight: -0.1
  centerline_exp: 2.0
  speed_weight: 0.05
  step_penalty: -0.05
  finish_bonus: 5000.0
  finish_time_weight: -5.0
  par_time_s: 60.0
  accel_bonus: 1.0
  airborne_penalty: -1.0
  crash_threshold_m: 25.0
  lidar_wall_weight: [0, -5.0, -20.0, -50.0]  # search axis: wall-proximity penalty strength

# ---------------------------------------------------------------------------
# Distributed coordinator settings (optional — only used with --distribute)
# ---------------------------------------------------------------------------
# distribute:
#   port: 5555                # coordinator HTTP port (default: 5555)
#   heartbeat_timeout: 60.0   # seconds before a silent worker is re-queued (default: 60)
