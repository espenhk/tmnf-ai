# Grid search: NeuralNetPolicy (neural_net)
#
# Primary axes:
#   hidden_sizes    — network architecture. Larger = more expressive but harder
#                     to train with hill-climbing (more parameters perturbed per
#                     mutation step). Expect diminishing returns or regression
#                     for networks larger than needed for the 15-dim observation.
#   mutation_scale  — interacts with network size: a fixed mutation_scale
#                     perturbs all parameters equally, so a larger network
#                     effectively needs a smaller scale to make coherent progress.
#
# cold_restarts=10 is a middle ground (more than hill_climbing's minimum of 5,
# less than the expensive 20) since neural nets have a harder loss landscape.
#
# Combos: 4 x 3 = 12

base_name: "gs_neural_net_v1"

training_params:
  speed: 10.0
  n_sims: 50
  in_game_episode_s: 30.0
  probe_s: 8.0
  cold_restarts: 10
  cold_sims: 5
  n_lidar_rays: 0
  policy_type: neural_net

  # --- Search axes ---
  hidden_sizes: [[8], [16], [16, 16], [32, 16]]
  mutation_scale: [0.01, 0.05, 0.1]

reward_params:
  progress_weight: 10000.0
  centerline_weight: -0.1
  centerline_exp: 2.0
  speed_weight: 0.05
  step_penalty: -0.05
  finish_bonus: 5000.0
  finish_time_weight: -5.0
  par_time_s: 60.0
  accel_bonus: 0.5
  airborne_penalty: -1.0
  crash_threshold_m: 25.0
  lidar_wall_weight: 0.0
