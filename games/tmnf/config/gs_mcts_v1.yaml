# Grid search: MCTSPolicy (UCT-based online Q-learner)
#
# Primary axes:
#   mcts_c  — UCB1 exploration constant. Balances exploiting known-good actions
#             vs visiting less-tried ones. Theoretical default is sqrt(2) ≈ 1.41
#             for zero-sum games, but environments with dense shaped rewards
#             may benefit from lower values (faster exploitation of progress
#             signal) or higher values (avoiding local action habits).
#   alpha   — Q-table learning rate. Low alpha averages smoothly but is slow to
#             adapt; high alpha tracks recent experience closely but is noisy.
#             Together, mcts_c and alpha control the explore/learn trade-off
#             from two complementary angles.
#
# n_bins=3 fixed: middle ground from epsilon_greedy findings. Varying it here
# would conflate architecture effects with the UCB-specific axes.
# n_sims=200 for same reason as epsilon_greedy (online learning, one ep/sim).
#
# Combos: 4 x 3 = 12

base_name: "gs_mcts_v1"

training_params:
  speed: 10.0
  n_sims: 200
  in_game_episode_s: 30.0
  mutation_scale: 0.05   # unused for Q-learning but required by grid_search.py
  probe_s: 8.0
  cold_restarts: 1       # unused for Q-learning but required by grid_search.py
  cold_sims: 1           # unused for Q-learning but required by grid_search.py
  n_lidar_rays: 0
  policy_type: mcts

  # Fixed policy params
  n_bins: 3
  gamma: 0.99

  # --- Search axes ---
  mcts_c: [0.5, 1.41, 3.0, 6.0]
  alpha: [0.05, 0.1, 0.3]

reward_params:
  progress_weight: 10000.0
  centerline_weight: -0.1
  centerline_exp: 2.0
  speed_weight: 0.05
  step_penalty: -0.05
  finish_bonus: 5000.0
  finish_time_weight: -5.0
  par_time_s: 60.0
  accel_bonus: 0.5
  airborne_penalty: -1.0
  crash_threshold_m: 25.0
  lidar_wall_weight: 0.0
