# Grid search: GeneticPolicy
#
# Primary axes:
#   population_size — how many individuals are evaluated per generation.
#                     Larger = broader coverage of weight space per generation
#                     but fewer generations within the same n_sims budget.
#                     Effective episode count = n_sims * population_size, so
#                     pop=5 runs 150 total episodes, pop=20 runs 600.
#   mutation_scale  — Gaussian noise applied when generating offspring.
#                     Acts identically to hill_climbing's mutation_scale.
#                     Too small → offspring cluster near parents (slow spread);
#                     too large → offspring are effectively random (no heredity).
#
# elite_k=3 fixed: keeps the top 3 survivors regardless of population size.
# This gives a 60% / 30% / 15% survival rate for pop 5 / 10 / 20 — the
# variation in survival pressure is intentional and part of what we're measuring.
# Varying elite_k independently would require a non-Cartesian design.
#
# n_sims=30 generations × up to 20 individuals = up to 600 episodes max,
# comparable to the Q-learning experiments at 200 sims.
#
# Combos: 3 x 3 = 9

base_name: "gs_genetic_v1"

training_params:
  speed: 10.0
  n_sims: 10
  in_game_episode_s: 90.0
  n_lidar_rays: 8
  policy_type: genetic

  # Fixed policy params

  # --- Search axes ---
  elite_k: [3, 5]
  population_size: 20
  mutation_scale: [0.01, 0.05]
  mutation_share: 1.0

reward_params:
  progress_weight: 10000.0
  centerline_weight: 0.0
  centerline_exp: 0.0
  speed_weight: 0.05
  step_penalty: -0.01
  finish_bonus: 5000.0
  finish_time_weight: -5.0
  par_time_s: 60.0
  accel_bonus: 1.0
  airborne_penalty: -1.0
  crash_threshold_m: 25.0
  lidar_wall_weight: [0, -5.0, -20.0]  # search axis: wall-proximity penalty strength
