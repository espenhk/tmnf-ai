# <GAME_TITLE> training parameters.
# Copy to games/<name>/config/training_params.yaml and fill in.

game: <name>                  # must match the key in GAME_ADAPTERS
speed: 1.0
in_game_episode_s: 60.0       # episode time limit in game-seconds
n_sims: 100
mutation_scale: 0.05
mutation_share: 1.0
adaptive_mutation: true
patience: 0

policy_type: genetic

policy_params:
  population_size: 20
  elite_k: 3
