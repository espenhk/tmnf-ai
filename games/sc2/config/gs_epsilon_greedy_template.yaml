# Grid search template: epsilon_greedy — MoveToBeacon
#
# Usage:
#   python grid_search.py games/sc2/config/gs_epsilon_greedy_template.yaml --game sc2
#
# Tabular Q-learning with ε-greedy exploration.  State is a discretised bin
# tuple of the observation; Q-values are stored in a dict keyed by that tuple.
# ε decays multiplicatively each episode.
#
# obs_spec_preset for tabular policies
# --------------------------------------
# n_bins=3 max states by preset:
#   ladder (43 dims):  3^43 ≈ 10^20  — intractable; included for diagnostic comparison
#   rich   (95 dims):  3^95 ≈ 10^45  — deeply intractable
# In practice the Q-table only stores visited states (~72 000 max for 300
# episodes).  The problem isn't table size but generalisation: with 43–95 dims,
# almost every state is unique so ε-greedy never transfers value from one visit
# to another nearby state.  Expect slower convergence than the minigame default.
# Increasing n_bins beyond 3 is counterproductive at these obs dims.
#
# Good first sweep: alpha × epsilon_decay.
# alpha (learning rate) and epsilon_decay jointly control speed vs. stability:
# high alpha + slow decay (→ 0.99) converges fast but can oscillate;
# low alpha + fast decay (→ 0.995) is more stable but slower.
#
# Belief system: NOT compatible with tabular policies
# ---------------------------------------------------
# enable_belief is fixed to false.  Belief adds 192 dims on top of 43–95, giving
# 3^235–3^287 ≈ 10^112 possible states — no state is ever revisited.  Use
# neural_dqn (gs_neural_dqn_template.yaml) for belief + Q-learning.

base_name: "gs_sc2_eps_greedy_v2"
game: sc2

training_params:
  map_name: DefeatRoaches
  obs_spec_preset: rich   # see state-space note above; both runs are diagnostic
  enable_belief: [false, true]              # tabular state-space explosion; see comment above
  in_game_episode_s: 120.0
  step_mul: 8
  screen_size: 64
  minimap_size: 64
  max_apm: 300
  agent_race: terran
  n_sims: 300                 # 300 episodes; tabular Q-learning needs many episodes to build the table
  policy_type: epsilon_greedy
  epsilon_decay: [0.99, 0.995]
  alpha: [0.05, 0.1, 0.2]
  #policy_params:
  n_bins: [2, 3, 4]
  epsilon: 1.0
  epsilon_min: 0.05
  gamma: 0.99

reward_params:
  score_weight: 1.0
  step_penalty: -0.001
  win_bonus: 20.0
  loss_penalty: 0.0
  idle_bonus: [0.5, 1.0, 5.0]
  move_exploration_bonus: 0.01
  move_repeat_penalty: -0.02
  move_self_penalty: -0.01
