# StarCraft 2 training parameters.
# Mirrors the TMNF / TORCS config structure with SC2-specific defaults.
#
# Minigame default: MoveToBeacon — genetic policy, 2-minute episodes.
# Ladder (Simple64) recommended settings are commented inline below.
# To train on Simple64 set map_name: Simple64 and optionally switch the
# reward_config.yaml to the ladder preset (score_weight: 0.0,
# economy_weight: 0.001 — see reward_config.yaml comments).

game: sc2
map_name: MoveToBeacon       # PySC2 map; one of MINIGAME_NAMES or a ladder map (e.g. Simple64)
agent_race: terran           # protoss | terran | zerg | random
bot_difficulty: very_easy    # only used on ladder maps; ignored for minigames
step_mul: 8                  # game ticks per env step (~0.5 s real-time at default speed)
screen_size: 64              # square feature-screen resolution
minimap_size: 64             # square feature-minimap resolution

speed: 1.0                   # SC2 has no in-engine speed multiplier; kept for framework compatibility
# Ladder maps (Simple64) use longer wall-clock episodes since a 1v1 game
# can last 5-15 minutes.  Minigames rarely need more than 120 s.
in_game_episode_s: 120.0     # wall-clock seconds before truncation (ladder: 600.0 recommended)
n_sims: 100                  # greedy simulations / generations after cold-start
mutation_scale: 0.05         # std-dev of Gaussian noise applied to each perturbed weight
mutation_share: 1.0          # fraction of weights perturbed per mutation (1.0 = all)
adaptive_mutation: true      # apply 1/5th success rule to adapt mutation_scale during greedy phase
patience: 0                  # stop greedy loop if no improvement for this many sims (0 = run all)

# Policy algorithm for the greedy training phase.
# SC2-specific policies (correct action encoding for [fn_idx, x, y, queue]):
#   sc2_genetic (default), sc2_reinforce, cmaes, neural_dqn, reinforce, lstm
# Framework tabular policies also work (select from DISCRETE_ACTIONS directly):
#   epsilon_greedy, mcts
# Note: hill_climbing, neural_net, and the framework's genetic policy are NOT
# compatible with SC2 because their output encoding collapses fn_idx to {0,1}
# and x/y to screen corners — use sc2_genetic instead.
#
# sc2_neural_dqn recommended policy_params (uncomment and set policy_type: sc2_neural_dqn):
# policy_params:
#   replay_buffer_size: 50000    # more transitions per episode than TMNF
#   min_replay_size: 2000        # proportional warm-up
#   epsilon_decay_steps: 20000   # longer exploration phase
#   gamma: 0.995                 # sparse win/loss reward needs long-horizon credit
#   hidden_sizes: [64, 64]
#   batch_size: 64
#   target_update_freq: 200
#   learning_rate: 0.001
#   epsilon_start: 1.0
#   epsilon_end: 0.05

policy_type: sc2_genetic

screen_layers: []                           # spatial feature layers for sc2_cnn policy; [] = disabled (required for sc2_genetic and other flat-obs policies)
minimap_layers: []                          # optional minimap channels (sc2_cnn only; requires screen_size == minimap_size)

# Observation spec preset (issue #126).  Leave unset to use the default
# mapping: minigame names → "minigame" (13 dims), ladder maps → "ladder"
# (43 dims).  Override with "rich" (80 dims) for the research-tier
# superset that adds per-unit-type counts, screen quadrants, top-3 nearest
# enemies and available-actions / last-action features.  Existing weight
# files migrate via the standard "missing key → 0.0" path.
# obs_spec_preset: minigame

policy_params:
  population_size: 30      # larger search space needs bigger population
  elite_k: 5
  eval_episodes: 2         # average fitness over 2 noisy episodes per individual
  mutation_scale: 0.1
  mutation_share: 0.3      # sparse mutation — mutate 30% of weights per individual

# Recommended sc2_reinforce hyperparams (uncomment policy_type: sc2_reinforce above):
# policy_params:
#   hidden_sizes: [128, 64]
#   learning_rate: 0.0003
#   gamma: 0.995
#   entropy_coeff: 0.05
#   baseline: running_mean