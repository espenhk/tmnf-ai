# Grid search template: sc2_neural_dqn — Simple64
#
# Usage:
#   python grid_search.py games/sc2/config/gs_neural_dqn_template.yaml --game sc2
#
# DQN selects from the 9-element DISCRETE_ACTIONS set.  Training starts only
# after min_replay_size transitions are collected; ε decays linearly from 1.0
# to epsilon_end over epsilon_decay_steps environment steps.
#
# At step_mul=1 a 120 s episode yields ~2 688 steps (22.4 ticks/s × 120 s).
# n_sims=200 gives ~537 000 total steps; set epsilon_decay_steps accordingly.
#
# Good first sweep: learning_rate × epsilon_decay_steps.
# learning_rate is the most sensitive knob; epsilon_decay_steps controls how
# long the agent explores before committing — too short → premature convergence,
# too long → slow learning.
#
# obs_spec_preset / belief interaction
# -------------------------------------
# Input dim and replay memory per transition:
#   ladder + no belief:  43 dims  →  43×4 = 688 B per transition
#   rich   + no belief:  95 dims  →  95×4 = 1520 B per transition
#   ladder + belief:    235 dims  → 235×4 = 3760 B per transition
#   rich   + belief:    287 dims  → 287×4 = 4592 B per transition
# replay_buffer_size=15 000 stays well under 70 MB for all combinations.
#
# Scout reward interacts with epsilon_decay_steps: during high-ε exploration
# the scout bonus is large (many unseen regions), shaping the Q-table before
# the task reward dominates.  Consider adding 5 000 to epsilon_decay_steps
# when enable_belief=true so exploitation starts after the scout bonus has
# faded to near-zero.
#
# DQN upgrades (v0.3.1)
# ---------------------
# double_dqn  (default true):  online-net selects action, target-net evaluates
#   it — curbs Q-value overestimation.
# dueling     (default false): splits into value + advantage streams; changes
#   weight-file shape so mixing with non-dueling saves requires --re-initialize.
# huber_loss  (default true):  smooth-L1 loss instead of MSE — clips gradient
#   for large TD errors, improving stability on sparse SC2 rewards.
# huber_kappa (default 1.0):   transition point between quadratic and linear
#   Huber regions; lower → more clipping, higher → closer to MSE.
# max_grad_norm (default 10.0): global-norm gradient clipping; null disables.
#
# Good ablation axes: double_dqn × dueling (2×2 = 4 combos) to isolate each
# upgrade's contribution, or huber_kappa × max_grad_norm for loss/clip tuning.

base_name: "v2"
game: sc2

training_params:
  map_name: BuildMarines
  in_game_episode_s: 600.0
  step_mul: 1
  screen_size: 64
  minimap_size: 64
  max_apm: 300
  agent_race: terran
  n_sims: 200                 # 200 episodes; ~48 000 env steps total
  policy_type: sc2_neural_dqn
  obs_spec_preset: rich
  enable_belief: true      # false: obs only; true: obs+192 belief dims + scout reward
  learning_rate: [0.0005, 0.001, 0.01]
  epsilon_decay_steps: [3000, 8000]
  hidden_sizes: [[64, 64], [64, 256, 256, 64]]

  policy_params:
    replay_buffer_size: 15000
    batch_size: 64
    min_replay_size: 500
    target_update_freq: 200
    epsilon_start: 1.0
    epsilon_end: 0.05
    gamma: 0.99
    double_dqn: true         # online-net selects, target-net evaluates (default on)
    dueling: false            # value + advantage decomposition (opt-in; changes weight shape)
    huber_loss: true          # smooth-L1 loss for TD-error stability (default on)
    huber_kappa: 1.0          # Huber threshold; lower → more gradient clipping
    max_grad_norm: 10.0       # global-norm clipping; null to disable

reward_params:
  step_penalty: 0.0
