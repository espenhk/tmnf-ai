# Grid search template: sc2_genetic — DefeatRoaches
#
# Usage:
#   python grid_search.py games/sc2/config/gs_genetic_template.yaml --game sc2
#
# SC2GeneticPolicy maintains a population of SC2MultiHeadLinearPolicy individuals
# (6 fn_idx rows + 2 spatial rows, each obs_dim wide).
#
# Flat parameter counts (8 rows × obs_dim):
#   minigame (13-dim):   8 ×  13 =  104 params
#   ladder   (43-dim):   8 ×  43 =  344 params
#   rich     (95-dim):   8 ×  95 =  760 params
#
# total episodes = n_sims × population_size × eval_episodes
#
# Mutation mechanics:
#   mutation_scale: Gaussian noise std-dev added to each perturbed weight.
#                   Too large → offspring diverge far from elites; after a good
#                   generation the next is often bad (champion fitness regresses).
#                   Too small → slow exploration.  Safe range: 0.02–0.2.
#   mutation_share: Fraction of weights perturbed per individual.  1.0 = dense
#                   (every weight nudged); lower values make finer local search
#                   around the elite genome.  0.3 is a good starting point.
#   eval_episodes:  Episodes averaged per individual for fitness estimation.
#                   Higher values reduce reward variance (stochastic environment
#                   noise causes "good run followed by bad run"); 2–4 is a
#                   practical range given episode budget.
#   population_size (λ): Rule of thumb for linear policies ≥ 2 × n_heads = 16.
#                   Recommend 20–40 for minigame/ladder obs; too few individuals
#                   leads to premature convergence.
#   elite_k:        Number of individuals preserved unchanged each generation.
#                   Setting to ~population_size/5 is typical.
#
# Good first sweep: mutation_scale × mutation_share

base_name: "gs_sc2_genetic_v1"
game: sc2

training_params:
  map_name: DefeatRoaches
  in_game_episode_s: 120.0
  step_mul: 8
  screen_size: 64
  minimap_size: 64
  max_apm: 300
  agent_race: terran
  n_sims: 50          # 50 generations; total episodes = n_sims × population_size × eval_episodes
  policy_type: sc2_genetic
  obs_spec_preset: [minigame, ladder]   # 13-dim minigame vs 43-dim ladder
  population_size: [20, 40]
  elite_k: 5
  eval_episodes: [2, 4]    # higher = less reward variance per fitness estimate
  mutation_scale: [0.05, 0.1, 0.2]
  mutation_share: [0.3, 1.0]     # sparse vs dense mutation

reward_params:
  move_exploration_bonus: 0.02
  move_repeat_penalty: -0.05
  move_self_penalty: -0.02
