# Grid search template: cmaes — MoveToBeacon
#
# Usage:
#   python grid_search.py games/sc2/config/gs_cmaes_template.yaml --game sc2
#
# CMA-ES adapts both step size (σ) and the full covariance matrix over 52
# parameters (13-dim minigame obs × 4 action heads).  σ is self-adapting, so
# initial_sigma is mainly a warm-start hint: too large → early divergence,
# too small → slow initial exploration.
#
# Good first sweep: initial_sigma × population_size.
# population_size (λ) controls how many offspring are evaluated per generation;
# larger λ is more robust but costs more episodes.
# Rule of thumb: λ ≈ 4 + floor(3 × ln(n)) ≈ 16 for n=52 params.
#
# obs_spec_preset / belief / population_size interaction
# -------------------------------------------------------
# SC2LinearPolicy has obs_dim × 4 parameters.  CMA-ES rule of thumb: λ ≈ 4+3·ln(n).
#
#   ladder + no belief:  43×4 = 172 params  → λ ≈ 20
#   rich   + no belief:  95×4 = 380 params  → λ ≈ 22
#   ladder + belief:    235×4 = 940 params  → λ ≈ 25
#   rich   + belief:    287×4 = 1148 params → λ ≈ 25
#
# population_size: [15, 25] spans this range.  CMA-ES adapts the covariance
# matrix automatically, so it handles the belief-weight subspace well; the
# main risk is early divergence if initial_sigma is too large — [0.1, 0.3]
# is the safe window for these parameter counts.

base_name: "gs_sc2_cmaes_v1"
game: sc2

training_params:
  map_name: Simple64
  in_game_episode_s: 120.0
  step_mul: 1
  screen_size: 64
  minimap_size: 64
  max_apm: 300
  agent_race: terran
  n_sims: 50                  # 50 generations; total episodes = n_sims × population_size × eval_episodes
  policy_type: sc2_cmaes
  obs_spec_preset: rich
  enable_belief: true
  population_size: [15, 25, 50]
  initial_sigma: [0.1, 0.3, 0.5]
  policy_params:
    eval_episodes: 5
