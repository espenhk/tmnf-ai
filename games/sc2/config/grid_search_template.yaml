# Grid search template: sc2_genetic — MoveToBeacon
#
# Usage:
#   python grid_search.py games/sc2/config/grid_search_template.yaml --game sc2
#
# sc2_genetic runs a population of SC2LinearPolicy individuals.
# Each generation: evaluate all individuals, keep elite_k unchanged,
# breed the rest via crossover + mutation.  n_sims = generations.
#
# Good first sweep: mutation_scale × mutation_share.
# Both interact — large scale + large share overshoots; large scale + small
# share gives sparse large steps; small scale + large share gives dense small
# steps.  The sweet spot for the 52-param MoveToBeacon space is usually
# mutation_scale ~0.1 with mutation_share ~0.3–0.5.
#
# Belief system (enable_belief)
# ------------------------------
# When true, SC2Env appends 192 extra dims to every observation:
#   64 value slots + 64 confidence slots (EWMABelief over 8×8 minimap grid)
#   + 64 staleness slots (RegionStalenessTracker)
# A scout intrinsic reward is also added per step when previously-unseen
# regions become visible.
#
# On MoveToBeacon the map is tiny and fully revealed quickly, so the scout
# reward fires once and the staleness dims converge fast.  The comparison is
# still informative: does giving the agent explicit "where have I been?"
# signal help it learn the beacon-chase policy faster, or does it add noise?
# For larger maps (Simple64) belief is much more impactful — see
# gs_rich_obs_template.yaml.
#
# With belief: SC2LinearPolicy weight count grows by 192 × 4 heads = 768
# extra parameters.  mutation_share=0.3 (sparse) is recommended to avoid
# large random steps through the belief-weight subspace before the policy
# has learned which belief dims are informative.

base_name: "gs_sc2_genetic_v1"
game: sc2

training_params:
  map_name: MoveToBeacon
  in_game_episode_s: 120.0
  step_mul: 8
  screen_size: 64
  minimap_size: 64
  agent_race: random
  n_sims: 5
  policy_type: sc2_genetic
  enable_belief: [false, true]   # false = 52-param baseline; true = 52+768 with scout reward
  policy_params:
    population_size: 5
    elite_k: 5
    eval_episodes: 2          # keep at 1 for grid search to preserve episode budget comparability
    mutation_scale: 0.05
    mutation_share: 1.0
    #mutation_scale: [0.05, 0.1, 0.2]
    #mutation_share: [0.3, 0.5, 1.0]

reward_params:
  score_weight: 1.0
  step_penalty: -0.001
  win_bonus: 0.0
  loss_penalty: 0.0
