# Grid search template: reinforce — MoveToBeacon
#
# Usage:
#   python grid_search.py games/sc2/config/gs_reinforce_template.yaml --game sc2
#
# REINFORCE collects full episodes, computes discounted returns, subtracts a
# running-mean baseline, then updates the softmax MLP via gradient ascent.
# One gradient update per episode (averaged over all steps in the episode).
#
# MoveToBeacon episodes are short and low-variance, so a running-mean baseline
# helps but normalisation inside on_episode_end() already handles most of it.
#
# Good first sweep: learning_rate × entropy_coeff.
# learning_rate drives convergence speed; entropy_coeff prevents premature
# commitment to a single action (too high → noisy forever, too low → collapses
# early).
#
# obs_spec_preset / belief interaction
# -------------------------------------
# Input dims and their effect on REINFORCE:
#   ladder + no belief:  43 dims  — economy + army state, no spatial memory
#   rich   + no belief:  95 dims  — adds shields, energy, creep, upgrades
#   ladder + belief:    235 dims  — adds 192-dim spatial belief grid + scout reward
#   rich   + belief:    287 dims  — full combination
#
# Scout reward (when belief=true) is embedded in each step's discounted return.
# On MoveToBeacon it fires once then fades — likely noise; on Simple64 it
# sustains an exploration gradient throughout the opening.
# Entropy regularisation (entropy_coeff) already encourages exploration, so
# the scout reward may be redundant on small maps.  The sweep lets you
# measure the overlap empirically.

base_name: "gs_sc2_reinforce_v1"
game: sc2

training_params:
  map_name: Simple64
  in_game_episode_s: 120.0
  step_mul: 1
  screen_size: 64
  minimap_size: 64
  max_apm: 300
  agent_race: random
  n_sims: 200                 # 200 episodes; REINFORCE needs more episodes than evolutionary methods
  policy_type: sc2_reinforce
  obs_spec_preset: rich
  enable_belief: [false, true]      # false: obs only; true: obs+192 belief dims + scout return
  learning_rate: [0.001, 0.003, 0.005]
  entropy_coeff: [0.01, 0.05]
  hidden_sizes: [64, 64]
  policy_params:
    gamma: 0.99
    baseline: running_mean    # "none" disables baseline; rarely better for minigames

